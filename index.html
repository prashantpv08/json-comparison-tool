<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSON Comparator (Light)</title>
    <style>
      html,
      body,
      #root {
        height: 100%;
      }
      body {
        margin: 0;
        background: #f8fafc;
        color: #0f172a;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      }
      .btn {
        border: 1px solid #cbd5e1;
        background: #fff;
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
      }
      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }
      .input {
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 8px;
        background: #fff;
      }
      .toolbar {
        position: sticky;
        top: 0;
        background: #ffffffcc;
        backdrop-filter: saturate(180%) blur(8px);
        border-bottom: 1px solid #e2e8f0;
        z-index: 10;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas,
          "Liberation Mono", monospace;
        font-size: 13px;
        line-height: 1.45;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 2px 8px;
        border: 1px solid #cbd5e1;
        background: #fff;
        font-size: 12px;
        margin-right: 8px;
      }
      .pill-yellow {
        background: #fef9c3;
        border-color: #fde68a;
      }
      .pill-red {
        background: #fecaca;
        border-color: #f87171;
        color: #991b1b;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
